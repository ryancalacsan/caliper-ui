name: Release

on:
  push:
    branches: [main]

# Never run two releases at once.
concurrency: release

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    # Exposed so the publish step can be skipped until an NPM_TOKEN secret
    # exists, keeping the workflow green in the meantime.
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci

      # Opens/updates a "Version Packages" PR when changesets are present, and
      # publishes to npm when there is something unpublished. Skipped entirely
      # until NPM_TOKEN is configured.
      - name: Create release PR or publish
        if: ${{ env.NPM_TOKEN != '' }}
        uses: changesets/action@v1
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
